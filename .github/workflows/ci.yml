name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  lockfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install uv
        run: python -m pip install --upgrade pip uv
      - run: uv lock --check

  # ── Lint + static analysis ──────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    needs: lockfile
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-deps
        with:
          python-version: "3.11"
          packages: ruff sqlfluff
      - run: ruff check skills/ tests/ mcp-server/ scripts/ --config pyproject.toml
      - run: sqlfluff lint packs

  skill-contract:
    runs-on: ubuntu-latest
    needs: lockfile          # parallelised with `lint` and `type-check`; tier-3 jobs still gate on all three
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-deps
        with:
          python-version: "3.11"
          packages: >-
            pyyaml
            boto3 defusedxml httpx
            google-cloud-compute google-cloud-iam google-cloud-resource-manager google-cloud-storage google-api-python-client
            azure-identity azure-mgmt-network azure-mgmt-resource azure-mgmt-storage
            clickhouse-connect databricks-sql-connector snowflake-connector-python
      - run: python scripts/validate_skill_contract.py
      - run: python scripts/validate_skill_integrity.py
      - run: python scripts/validate_skill_runtime.py
      - run: python scripts/validate_skill_structure.py
      - run: python scripts/validate_presets.py
      - run: python scripts/validate_dependency_consistency.py
      - run: python scripts/validate_framework_coverage.py
      - run: python scripts/validate_ocsf_metadata.py
      - run: python scripts/validate_skill_count_consistency.py
      - run: python scripts/validate_deny_list_parity.py
      - run: python scripts/validate_captured_provenance.py
      - run: python scripts/add_skill_trust_frontmatter.py --check
      - name: Auto-generated docs in sync (run all generators in --check)
        run: |
          set +e
          python scripts/generate_framework_coverage_doc.py --check; rc1=$?
          python scripts/generate_security_bar_matrix.py --check;     rc2=$?
          python scripts/coverage_summary.py --check;                  rc3=$?
          if [ $rc1 -ne 0 ] || [ $rc2 -ne 0 ] || [ $rc3 -ne 0 ]; then
            echo ""
            echo "::error::auto-generated docs are stale. Regenerate locally:"
            echo "::error::  python scripts/generate_framework_coverage_doc.py"
            echo "::error::  python scripts/generate_security_bar_matrix.py"
            echo "::error::  python scripts/coverage_summary.py --write"
            echo "::error::then \`git add docs/FRAMEWORK_COVERAGE.md SECURITY_BAR.md docs/COVERAGE_SNAPSHOT.md\` and commit."
            exit 1
          fi

  type-check:
    runs-on: ubuntu-latest
    needs: lockfile          # parallelised with `lint` and `skill-contract`
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-deps
        with:
          python-version: "3.11"
          packages: mypy
      - run: bash scripts/run_mypy.sh

  safe-skill-bar:
    runs-on: ubuntu-latest
    needs: [lint, skill-contract, type-check]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-deps
        with:
          python-version: "3.11"
          packages: bandit pip-audit
      - run: python scripts/validate_safe_skill_bar.py
      - name: OCSF 1.8 golden-fixture validation
        run: python scripts/validate_golden_ocsf.py
      - name: Check for hardcoded secrets
        run: |
          ! grep -rn "AKIA[A-Z0-9]\{16\}" skills/*/*/src/ mcp-server/src/ scripts/ --include="*.py" || exit 1
          ! grep -rn "sk-[a-zA-Z0-9]\{20,\}" skills/*/*/src/ mcp-server/src/ scripts/ --include="*.py" || exit 1
          ! grep -rn "ghp_[a-zA-Z0-9]\{36\}" skills/*/*/src/ mcp-server/src/ scripts/ --include="*.py" || exit 1
          echo "No hardcoded secrets found in enforced executable paths"
      - name: Dependency vulnerability audit
        run: pip-audit "${{ github.workspace }}"

  security-scan:
    runs-on: ubuntu-latest
    needs: [lint, skill-contract, type-check, safe-skill-bar]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-deps
        with:
          python-version: "3.11"
          packages: bandit
      - run: bandit -r skills mcp-server scripts -c pyproject.toml --severity-level medium

  # ── Unit tests, grouped into category lanes ───────────────────
  test-compliance:
    runs-on: ubuntu-latest
    needs: [lint, skill-contract, type-check, safe-skill-bar]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-deps
        with:
          python-version: "3.11"
          packages: >-
            boto3 moto pytest pytest-cov
            google-cloud-compute google-cloud-iam google-cloud-resource-manager google-cloud-storage
            azure-identity azure-mgmt-network azure-mgmt-resource azure-mgmt-storage
      - name: Run compliance skill suites
        shell: bash
        run: |
          set -euo pipefail
          for skill in \
            cspm-aws-cis-benchmark \
            cspm-gcp-cis-benchmark \
            cspm-azure-cis-benchmark \
            k8s-security-benchmark \
            container-security
          do
            echo "==> skills/evaluation/${skill}"
            pytest "skills/evaluation/${skill}/tests/" -v -o "testpaths=tests"
          done

  test-remediation:
    runs-on: ubuntu-latest
    needs: [lint, skill-contract, type-check, safe-skill-bar]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-deps
        with:
          python-version: "3.11"
          packages: >-
            boto3 moto pytest pytest-cov
            google-cloud-iam google-cloud-resource-manager google-api-python-client
            azure-identity
            clickhouse-connect databricks-sql-connector httpx snowflake-connector-python
      - run: pytest skills/remediation/iam-departures-aws/tests/ -v -o "testpaths=tests"

  test-detection-engineering:
    runs-on: ubuntu-latest
    needs: [lint, skill-contract, type-check, safe-skill-bar]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-deps
        with:
          python-version: "3.11"
          packages: pytest pytest-cov
      - name: Run ingestion, detection, and view suites
        shell: bash
        run: |
          set -euo pipefail
          for skill_dir in \
            skills/ingestion/ingest-cloudtrail-ocsf \
            skills/ingestion/ingest-vpc-flow-logs-ocsf \
            skills/ingestion/ingest-vpc-flow-logs-gcp-ocsf \
            skills/ingestion/ingest-nsg-flow-logs-azure-ocsf \
            skills/ingestion/ingest-guardduty-ocsf \
            skills/ingestion/ingest-security-hub-ocsf \
            skills/ingestion/ingest-gcp-scc-ocsf \
            skills/ingestion/ingest-azure-defender-for-cloud-ocsf \
            skills/ingestion/ingest-gcp-audit-ocsf \
            skills/ingestion/ingest-azure-activity-ocsf \
            skills/ingestion/ingest-entra-directory-audit-ocsf \
            skills/ingestion/ingest-okta-system-log-ocsf \
            skills/ingestion/ingest-google-workspace-login-ocsf \
            skills/ingestion/ingest-k8s-audit-ocsf \
            skills/ingestion/ingest-mcp-proxy-ocsf \
            skills/detection/detect-mcp-tool-drift \
            skills/detection/detect-okta-mfa-fatigue \
            skills/detection/detect-entra-credential-addition \
            skills/detection/detect-entra-role-grant-escalation \
            skills/detection/detect-google-workspace-suspicious-login \
            skills/detection/detect-privilege-escalation-k8s \
            skills/detection/detect-sensitive-secret-read-k8s \
            skills/detection/detect-lateral-movement \
            skills/view/convert-ocsf-to-sarif \
            skills/view/convert-ocsf-to-mermaid-attack-flow
          do
            echo "==> ${skill_dir}"
            pytest "${skill_dir}/tests/" -v -o "testpaths=tests"
          done

  test-ai-infra-security:
    runs-on: ubuntu-latest
    needs: [lint, skill-contract, type-check, safe-skill-bar]
    name: test-ai-infra
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-deps
        with:
          python-version: "3.11"
          packages: >-
            boto3 pytest pytest-cov
            google-cloud-compute google-cloud-iam google-cloud-resource-manager google-cloud-storage
            azure-identity azure-mgmt-resource
      - name: Run discovery and AI infra skill suites
        shell: bash
        run: |
          set -euo pipefail
          for skill_dir in \
            skills/discovery/discover-environment \
            skills/discovery/discover-ai-bom \
            skills/discovery/discover-control-evidence \
            skills/discovery/discover-cloud-control-evidence \
            skills/evaluation/model-serving-security \
            skills/evaluation/gpu-cluster-security
          do
            echo "==> ${skill_dir}"
            pytest "${skill_dir}/tests/" -v -o "testpaths=tests"
          done

  test-integration:
    runs-on: ubuntu-latest
    needs: [lint, skill-contract, type-check, safe-skill-bar]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-deps
        with:
          python-version: "3.11"
          packages: boto3 moto pytest pytest-cov defusedxml pyyaml
      - run: pytest tests/integration/ tests/conformance/ mcp-server/tests/ -v -o "testpaths=tests"

  coverage:
    runs-on: ubuntu-latest
    needs: [lint, skill-contract, type-check, safe-skill-bar]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-deps
        with:
          python-version: "3.11"
          packages: >-
            boto3 moto pytest pytest-cov
            defusedxml pyyaml
            google-cloud-compute google-cloud-iam google-cloud-resource-manager google-cloud-storage
            azure-identity azure-mgmt-network azure-mgmt-resource azure-mgmt-storage
            google-api-python-client
            clickhouse-connect databricks-sql-connector httpx snowflake-connector-python
      - name: Run full test suite with coverage gates
        run: pytest skills/ tests/integration/ tests/conformance/ mcp-server/tests/ --cov=skills --cov-report=term-missing --cov-report=xml
      - name: Validate coverage floors
        run: python scripts/validate_test_coverage.py coverage.xml

  sbom:
    runs-on: ubuntu-latest
    needs: [lint, skill-contract, type-check, safe-skill-bar]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-deps
        with:
          python-version: "3.11"
          packages: uv==0.10.9
      - name: Export full-lock CycloneDX SBOM
        run: |
          uv export \
            --preview-features sbom-export \
            --format cyclonedx1.5 \
            --all-groups \
            --output-file cloud-ai-security-skills-full-lock.cdx.json
      - uses: sigstore/cosign-installer@v4.1.2
      - name: Sign SBOM with GitHub OIDC
        run: |
          cosign sign-blob --yes \
            --bundle cloud-ai-security-skills-full-lock.cdx.json.sigstore.json \
            cloud-ai-security-skills-full-lock.cdx.json
      - uses: actions/upload-artifact@v7
        with:
          name: cyclonedx-sbom
          path: |
            cloud-ai-security-skills-full-lock.cdx.json
            cloud-ai-security-skills-full-lock.cdx.json.sigstore.json

  # ── IaC + shell validation (CloudFormation, Terraform, Bicep, Bash) ─
  validate-iac:
    runs-on: ubuntu-latest
    needs: [lint, skill-contract, type-check, safe-skill-bar]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-deps
        with:
          python-version: "3.11"
          packages: cfn-lint
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.12.0"
      - uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: v0.58.0
      - name: Install Azure Bicep CLI
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.local/bin"
          curl --fail --show-error --location --retry 3 --retry-all-errors \
            https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64 \
            --output "${HOME}/.local/bin/bicep"
          file "${HOME}/.local/bin/bicep" | grep -q "ELF 64-bit"
          chmod +x "${HOME}/.local/bin/bicep"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
          "${HOME}/.local/bin/bicep" --version
      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends shellcheck
      - name: cfn-lint — CloudFormation
        run: |
          cfn-lint skills/remediation/iam-departures-aws/infra/cloudformation.yaml
          cfn-lint skills/remediation/iam-departures-aws/infra/cross_account_stackset.yaml
          cfn-lint runners/aws-s3-sqs-detect/template.yaml
      - name: terraform validate — iam-departures infra
        run: cd skills/remediation/iam-departures-aws/infra/terraform && terraform init -backend=false && terraform validate
      - name: terraform validate — gcp runner
        run: cd runners/gcp-gcs-pubsub-detect && terraform init -backend=false && terraform validate
      - name: tflint — iam-departures infra
        run: cd skills/remediation/iam-departures-aws/infra/terraform && tflint
      - name: tflint — gcp runner
        run: cd runners/gcp-gcs-pubsub-detect && tflint
      - name: bicep build — azure runner
        run: bicep build runners/azure-blob-eventgrid-detect/template.bicep --outfile /tmp/azure-runner.json
      - name: shellcheck — scripts
        run: shellcheck scripts/*.sh

  # ── agent-bom scans (code + skills + fs + IaC with SARIF upload) ─
  agent-bom:
    runs-on: ubuntu-latest
    needs: [lint, skill-contract, type-check, safe-skill-bar]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-deps
        with:
          python-version: "3.11"
          packages: agent-bom
      - name: Scan code for AI components
        run: agent-bom code skills/ -f json -o code-scan.json || true
      - name: Audit skill definitions
        run: agent-bom skills scan skills/ -f json -o skills-audit.json --verbose || true
      - name: Scan filesystem for packages and CVEs
        run: agent-bom fs skills/ -f json -o fs-scan.json || true
      - name: Scan IaC (CloudFormation + Terraform)
        run: |
          agent-bom iac \
            skills/remediation/iam-departures-aws/infra/cloudformation.yaml \
            skills/remediation/iam-departures-aws/infra/cross_account_stackset.yaml \
            skills/remediation/iam-departures-aws/infra/terraform/main.tf \
            -f json -o iac-scan.json || true
      - name: Scan IaC (SARIF for code scanning)
        run: |
          agent-bom iac \
            skills/remediation/iam-departures-aws/infra/cloudformation.yaml \
            skills/remediation/iam-departures-aws/infra/cross_account_stackset.yaml \
            skills/remediation/iam-departures-aws/infra/terraform/main.tf \
            -f sarif -o iac-scan.sarif || true
      - name: Normalise SARIF (handle agent-bom empty-result quirk)
        if: always()
        run: |
          python3 - <<'PY'
          import json, os
          path = "iac-scan.sarif"
          stub = {
              "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json",
              "version": "2.1.0",
              "runs": [{
                  "tool": {"driver": {"name": "agent-bom-iac", "version": "0.76.2", "informationUri": "https://github.com/msaad00/agent-bom"}},
                  "results": []
              }]
          }
          if not os.path.exists(path):
              json.dump(stub, open(path, "w"))
              print("wrote stub SARIF (file missing)")
          else:
              try:
                  doc = json.load(open(path))
              except Exception as e:
                  json.dump(stub, open(path, "w"))
                  print(f"wrote stub SARIF (json parse failed: {e})")
              else:
                  if not (isinstance(doc, dict) and "runs" in doc):
                      json.dump(stub, open(path, "w"))
                      print("wrote stub SARIF (not SARIF-shaped)")
                  else:
                      print(f"SARIF ok: {len(doc.get('runs', []))} runs")
          PY
      - name: Upload IaC SARIF to GitHub code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: iac-scan.sarif
          category: agent-bom-iac
        continue-on-error: true
      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: agent-bom-results
          path: |
            code-scan.json
            skills-audit.json
            fs-scan.json
            iac-scan.json
            iac-scan.sarif
          if-no-files-found: ignore
