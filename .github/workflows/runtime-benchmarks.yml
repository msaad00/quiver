name: Runtime Benchmarks

on:
  pull_request:
    paths:
      - "docs/benchmarks/runtime-profiles-2026-04-16.json"
      - "pyproject.toml"
      - "uv.lock"
      - "scripts/benchmark_runtime_profiles.py"
      - "scripts/check_runtime_profile_regressions.py"
      - "skills/_shared/**"
      - "skills/detection/detect-lateral-movement/**"
      - "skills/ingestion/ingest-cloudtrail-ocsf/**"
      - "skills/output/sink-snowflake-jsonl/**"
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

permissions:
  contents: read

jobs:
  benchmark-regression:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Generate fresh benchmark snapshot
        run: |
          python scripts/benchmark_runtime_profiles.py \
            --output runtime-profiles-current.json

      - name: Check scaling against baseline
        run: |
          python scripts/check_runtime_profile_regressions.py \
            --baseline docs/benchmarks/runtime-profiles-2026-04-16.json \
            --candidate runtime-profiles-current.json

      - name: Upload benchmark snapshot
        uses: actions/upload-artifact@v7
        with:
          name: runtime-profiles-current
          path: runtime-profiles-current.json
