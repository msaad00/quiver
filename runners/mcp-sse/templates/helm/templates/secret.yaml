{{- if not .Values.secrets.existingSecret }}
{{- /*
  Chart-managed Secret.

  Two keys:
    sse-bearer-keys.json — JSON array of {kid, secret, issued, expires}.
                            Mounted into the pod at
                            {{ .Values.volumes.bearerKeys.mountPath }}.
    audit-hmac.key       — HMAC key for the tamper-evident audit chain.
                            Surfaced as CLOUD_SECURITY_AUDIT_HMAC_KEY.

  The chart only owns this resource when secrets.existingSecret is
  empty. In production prefer the existingSecret path with a
  sealed-secrets / external-secrets workflow.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mcp-sse.fullname" . }}-secrets
  labels: {{- include "mcp-sse.labels" . | nindent 4 }}
type: Opaque
stringData:
  sse-bearer-keys.json: |-
{{ .Values.secrets.bearerKeysJson | default "[]" | indent 4 }}
  audit-hmac.key: {{ .Values.secrets.auditHmacKey | default "" | quote }}
{{- end }}
